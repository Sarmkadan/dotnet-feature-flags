services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: featureflags-mssql
    environment:
      SA_PASSWORD: "YourStrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrongPassword123! -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - featureflags-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: featureflags-api
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >
        Server=mssql;Database=FeatureFlagEngine;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=true;
      FeatureFlags__EnableCache: "true"
      FeatureFlags__CacheDurationMinutes: "5"
      FeatureFlags__AuditLogRetentionDays: "365"
      FeatureFlags__EnableAuditLogging: "true"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - featureflags-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  mssql-data:

networks:
  featureflags-network:
    driver: bridge
